name: TunisieFreelance monitor

on:
  schedule:
    - cron: "*/20 * * * *" # every 20 minutes (best-effort; GitHub may lag a bit)
  workflow_dispatch: {} # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for new projects
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional: CATEGORIES, MAX_AGE_DAYS
        run: node scraper.js

      - name: Persist state
        run: |
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen.json
            git commit -m "chore: update seen projects [skip ci]"
            git push
          else
            echo "No state change."
          fi
