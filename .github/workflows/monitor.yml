name: TunisieFreelance monitor

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). Actual runs may lag a few minutes
    # under load — that's fine, dedup by project id means nothing is missed.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you run it manually from the Actions tab

# Needed so the job can commit the updated seen.json back to the repo.
permissions:
  contents: write

# Never let two runs overlap.
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for new projects
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional overrides:
          # CATEGORIES: "mobile-development,web-development"
          # MAX_AGE_DAYS: "7"
        run: node scraper.js

      - name: Persist state
        run: |
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen.json
            git commit -m "chore: update seen projects [skip ci]"
            git push
          else
            echo "No state change."
          fi
